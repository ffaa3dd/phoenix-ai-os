version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: phoenix_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-phoenix_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password}
      POSTGRES_DB: phoenix_ai_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - phoenix_network

  redis:
    image: redis:7-alpine
    container_name: phoenix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - phoenix_network

volumes:
  postgres_data:
  redis_data:

networks:
  phoenix_network:
    driver: bridge
